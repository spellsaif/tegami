name: Version

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    name: Open Version PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check pending changelogs
        id: changelogs
        shell: bash
        run: |
          if [ -f ".tegami/publish-plan.json" ]; then
            echo "has_changelogs=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if compgen -G ".tegami/*.md" > /dev/null; then
            echo "has_changelogs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changelogs=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.changelogs.outputs.has_changelogs == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: steps.changelogs.outputs.has_changelogs == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: steps.changelogs.outputs.has_changelogs == 'true'
        run: pnpm install --frozen-lockfile

      - name: Version packages
        if: steps.changelogs.outputs.has_changelogs == 'true'
        run: pnpm run version
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
